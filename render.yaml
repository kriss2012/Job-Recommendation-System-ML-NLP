services:
  - type: web
    name: job-rec-backend
    env: python
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: gunicorn app:app
    envVars:
      - key: MONGO_URI
        sync: false
        description: "Your MongoDB Atlas connection URI"
      - key: DB_NAME
        value: "jobrecdb"
