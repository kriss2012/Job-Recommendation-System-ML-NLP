{% extends 'layout.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="glass-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Access your AI-powered job recommendation dashboard</p>
        </div>
        
        <!-- Error Alerts -->
        {% if error_message %}
        <div class="alert-error">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span>{{ error_message }}</span>
        </div>
        {% endif %}
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control-modern" name="email" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control-modern" name="password" placeholder="••••••••" required>
            </div>
            
            <div class="form-actions-split">
                <button type="submit" class="btn-primary-modern">
                    <i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i> Login
                </button>
                <a href="{{ url_for('signup') }}" class="btn-secondary-modern">
                    <i class="fa-solid fa-user-plus" style="margin-right: 8px;"></i> Sign Up
                </a>
            </div>
        </form>
        
        <div class="form-footer-link">
            Don't have an account? <a href="{{ url_for('signup') }}">Create one here</a>
        </div>
    </div>
</div>
{% endblock %}
